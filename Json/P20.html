<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Operaciones Matemáticas - UAS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 30px; }
        .contenedor { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { color: #1a4cd4; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .resultado { font-size: 1.2rem; margin: 15px 0; padding: 10px; background: #eef2f5; border-left: 5px solid #1a4cd4; }
        strong { color: #333; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Resultados Matemáticos</h1>
        
        <div id="suma" class="resultado"></div>
        <div id="resta" class="resultado"></div>
        <div id="division" class="resultado"></div>
        <div id="exponenciacion" class="resultado"></div>
    </div>

    <script>
      
        let n1 = 10;
        let n2 = 3;

      
        document.getElementById("suma").innerHTML = `Suma (${n1} + ${n2}): <strong>${n1 + n2}</strong>`;
        document.getElementById("resta").innerHTML = `Resta (${n1} - ${n2}): <strong>${n1 - n2}</strong>`;
        document.getElementById("division").innerHTML = `División (${n1} / ${n2}): <strong>${(n1 / n2).toFixed(2)}</strong>`;
        document.getElementById("exponenciacion").innerHTML = `Exponenciación (${n1}<sup>${n2}</sup>): <strong>${Math.pow(n1, n2)}</strong>`;

     
        console.log("Operaciones realizadas con éxito");
    </script>

</body>
</html>
