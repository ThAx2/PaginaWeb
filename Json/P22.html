<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fórmula General - Mi Práctica</title>
    <style>
        body { font-family: sans-serif; padding: 30px; text-align: center; background-color: #f9f9f9; }
        .formulario { border: 2px solid #1a4cd4; padding: 20px; width: 320px; margin: auto; background: white; border-radius: 10px; }
        input { width: 60px; padding: 8px; margin: 10px 5px; text-align: center; }
        button { background: #1a4cd4; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #resultados { margin-top: 20px; padding: 15px; border-top: 1px solid #eee; }
        .valor-x { color: #1a4cd4; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="formulario">
        <h3>Fórmula General</h3>
        <p>ax² + bx + c = 0</p>
        
        <label>a:</label> <input type="number" id="valA" placeholder="0"> <br>
        <label>b:</label> <input type="number" id="valB" placeholder="0"> <br>
        <label>c:</label> <input type="number" id="valC" placeholder="0"> <br>

        <button onclick="calcularFormula()">Calcular X1 y X2</button>

        <div id="resultados">
            <p>X1 = <span id="x1" class="valor-x">?</span></p>
            <p>X2 = <span id="x2" class="valor-x">?</span></p>
        </div>
    </div>

    <script>
        function calcularFormula() {
        
            var a = parseFloat(document.getElementById("valA").value);
            var b = parseFloat(document.getElementById("valB").value);
            var c = parseFloat(document.getElementById("valC").value);

          
            var discriminante = (b * b) - (4 * a * c);

            if (discriminante < 0) {
                alert("El discriminante es negativo. Las raíces son imaginarias.");
                document.getElementById("x1").innerHTML = "Error";
                document.getElementById("x2").innerHTML = "Error";
            } else if (a == 0) {
                alert("El valor de 'a' no puede ser 0 (división por cero).");
            } else {
                
                var x1 = (-b + Math.sqrt(discriminante)) / (2 * a);
                var x2 = (-b - Math.sqrt(discriminante)) / (2 * a);

                
                document.getElementById("x1").innerHTML = x1.toFixed(2);
                document.getElementById("x2").innerHTML = x2.toFixed(2);
                
                console.log("Cálculo exitoso para el grupo 301.");
            }
        }
    </script>

</body>
</html>
