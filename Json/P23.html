<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cálculo de IMC - Práctica 23</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 40px; text-align: center; }
        .contenedor { background: white; padding: 25px; border-radius: 10px; width: 300px; margin: auto; border: 1px solid #ddd; }
        input { width: 80%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #d41a7b; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #a3145e; }
        #resultado { margin-top: 20px; padding: 10px; font-weight: bold; }
        .info-mujer { color: #d41a7b; font-size: 0.9rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h3>Calculadora de IMC</h3>
        <p class="info-mujer">Referencia: Perfil Femenino</p>
        
        <label>Peso (kg):</label>
        <input type="number" id="peso" placeholder="Ej. 60" step="0.1">
        
        <label>Estatura (m):</label>
        <input type="number" id="estatura" placeholder="Ej. 1.65" step="0.01">

        <button onclick="calcularIMC()">Calcular Grado</button>

        <div id="resultado">---</div>
    </div>

    <script>
        function calcularIMC() {
            var p = parseFloat(document.getElementById("peso").value);
            var e = parseFloat(document.getElementById("estatura").value);
            var salida = document.getElementById("resultado");

            if (!p || !e || e <= 0) {
                alert("Por favor, ingresa valores válidos.");
                return;
            }

            var imc = p / (e * e);
            var grado = "";

         
            if (imc < 18.5) {
                grado = "Bajo peso";
            } else if (imc >= 18.5 && imc <= 24.9) {
                grado = "Peso normal (Saludable)";
            } else if (imc >= 25.0 && imc <= 29.9) {
                grado = "Sobrepeso";
            } else if (imc >= 30.0 && imc <= 34.9) {
                grado = "Obesidad Grado I";
            } else if (imc >= 35.0 && imc <= 39.9) {
                grado = "Obesidad Grado II";
            } else {
                grado = "Obesidad Grado III (Mórbida)";
            }

          
            salida.innerHTML = "Tu IMC es: " + imc.toFixed(2) + "<br>Grado: " + grado;
     
            console.log("Cálculo de IMC completado para práctica #23.");
        }
    </script>

</body>
</html>
